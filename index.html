<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>⚽ eFootball 金币换汇 · 双模 + 抽卡规划</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js" crossorigin></script>
    <style>
        /* 原有样式保留，增加新样式 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #f0f2f5; min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 12px; touch-action: manipulation; }
        .app-container { max-width: 500px; width: 100%; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); }
        header { text-align: center; margin-bottom: 12px; }
        header h1 { font-size: 20px; color: #1a1a2e; margin-bottom: 2px; }
        header .subtitle { color: #888; font-size: 13px; }

        /* Tab 切换胶囊 */
        .tab-bar {
            display: flex;
            background: #f1f5f9;
            border-radius: 30px;
            padding: 4px;
            margin-bottom: 14px;
            gap: 4px;
        }
        .tab-btn {
            flex: 1;
            border: none;
            background: transparent;
            padding: 10px 0;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 500;
            color: #64748b;
            cursor: pointer;
            transition: all 0.25s;
            min-height: 44px;
        }
        .tab-btn.active {
            background: #6366f1;
            color: white;
            box-shadow: 0 2px 8px rgba(99,102,241,0.3);
        }
        .tab-btn:active { transform: scale(0.96); }

        .rate-banner {
            background: #eef2ff;
            border-radius: 12px;
            padding: 10px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .rate-banner .label { color: #4b5563; font-size: 13px; }
        .rate-banner .value { font-weight: 600; color: #1a1a2e; font-size: 14px; }
        .rate-banner .refresh-btn {
            background: #6366f1;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            min-height: 36px;
        }
        .rate-banner .refresh-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .source-selector {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f8fafc;
            padding: 6px 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .source-selector label { font-size: 13px; color: #4b5563; }
        .source-selector select {
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid #d1d5db;
            background: white;
            font-size: 13px;
        }
        .source-info { font-size: 12px; color: #4b5563; text-align: center; margin-top: 4px; }

        .card { background: #f8fafc; border-radius: 14px; padding: 16px; margin-bottom: 14px; }
        .card .label { font-size: 14px; color: #64748b; margin-bottom: 6px; display: block; }

        .input-group {
            display: flex;
            align-items: center;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
            background: white;
        }
        .input-group input {
            flex: 1;
            border: none;
            padding: 12px 14px;
            font-size: 18px;
            outline: none;
            background: transparent;
            min-height: 44px;
        }
        .input-group .unit-label {
            padding: 0 14px;
            color: #94a3b8;
            font-weight: 500;
            font-size: 14px;
            background: #f1f5f9;
            height: 100%;
            display: flex;
            align-items: center;
        }

        .slider-container { margin-top: 12px; }
        input[type="range"] {
            width: 100%;
            height: 4px;
            background: #e2e8f0;
            border-radius: 4px;
            outline: none;
            appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #6366f1;
            cursor: pointer;
            border: 2px solid white;
            box-shadow: 0 1px 4px rgba(0,0,0,0.15);
        }

        .result-box {
            background: #1e293b;
            border-radius: 16px;
            padding: 18px;
            color: white;
            text-align: center;
            margin-top: 12px;
        }
        .result-box .label { color: #94a3b8; font-size: 14px; display: block; margin-bottom: 6px; }
        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 6px;
        }
        .result-item {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 10px;
        }
        .result-item .sub-label { font-size: 12px; color: #94a3b8; display: block; }
        .result-item .amount {
            font-size: 24px;
            font-weight: 700;
            color: #fbbf24;
        }
        .result-item .amount .currency { font-size: 16px; font-weight: 400; color: #fbbf24; margin-right: 3px; }
        .result-single {
            font-size: 34px;
            font-weight: 700;
            color: #fbbf24;
            padding: 6px 0;
        }
        .result-single .currency { font-size: 22px; font-weight: 400; margin-right: 4px; }

        .detail-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            font-size: 13px;
            color: #94a3b8;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .detail-row span { display: inline-flex; align-items: center; gap: 4px; }
        .detail-row .highlight { color: #e2e8f0; font-weight: 500; }

        .footnote {
            text-align: center;
            color: #94a3b8;
            font-size: 11px;
            margin-top: 14px;
            padding-top: 10px;
            border-top: 1px solid #e2e8f0;
            line-height: 1.6;
        }
        .footnote .byline { color: #6366f1; font-weight: 500; font-size: 12px; }

        .error-banner {
            background: #fee2e2;
            color: #dc2626;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 12px;
            text-align: center;
        }
        .error-banner button {
            background: none;
            border: none;
            color: #6366f1;
            text-decoration: underline;
            cursor: pointer;
            font-weight: 500;
        }

        /* 抽卡规划模块 */
        .plan-box {
            background: #f8fafc;
            border-radius: 14px;
            padding: 16px;
            margin-top: 14px;
        }
        .plan-box .plan-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .plan-box .plan-title {
            font-weight: 600;
            color: #1a1a2e;
            font-size: 15px;
        }
        .plan-box .plan-period {
            font-size: 12px;
            color: #64748b;
        }
        .plan-input-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .plan-input-group input {
            flex: 1;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 18px;
            outline: none;
            background: white;
            min-height: 44px;
        }
        .plan-input-group .unit-label {
            color: #94a3b8;
            font-weight: 500;
            font-size: 14px;
        }
        .plan-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 12px;
            color: #94a3b8;
        }
        .plan-actions .clear-btn {
            background: none;
            border: none;
            color: #dc2626;
            text-decoration: underline;
            cursor: pointer;
            font-size: 12px;
        }
        .plan-actions .saved-tip {
            color: #22c55e;
        }

        @media (max-width: 480px) {
            .source-selector { flex-direction: column; align-items: stretch; }
            .tab-btn { font-size: 14px; padding: 8px 0; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            // ---------- 原有状态 ----------
            const [coinAmount, setCoinAmount] = React.useState(12000);
            const [jpyToEurRate, setJpyToEurRate] = React.useState(null);
            const [loading, setLoading] = React.useState(true);
            const [error, setError] = React.useState(null);
            const [cnyPer10Eur, setCnyPer10Eur] = React.useState('75');
            const [sourceInfo, setSourceInfo] = React.useState('');
            const [preferredSource, setPreferredSource] = React.useState('cloudflare');

            // ---------- 新增状态 ----------
            const [activeTab, setActiveTab] = React.useState('euro'); // 'euro' 或 'yen'
            const [planPulls, setPlanPulls] = React.useState(() => {
                // 从 localStorage 读取抽卡规划
                const saved = localStorage.getItem('planPulls');
                return saved ? parseInt(saved, 10) || 0 : 0;
            });
            const [lastSaved, setLastSaved] = React.useState(() => {
                const time = localStorage.getItem('planPullsTime');
                return time ? new Date(parseInt(time, 10)) : null;
            });

            const FALLBACK_RATE = 0.0054;

            // ---------- 数据源配置（不变） ----------
            const API_SOURCES = {
                cloudflare: {
                    name: 'Cloudflare Pages (推荐)',
                    url: 'https://latest.currency-api.pages.dev/v1/currencies/jpy.json',
                    parse: (data) => data?.jpy?.eur
                },
                jsdelivr: {
                    name: 'jsDelivr CDN (备选)',
                    url: 'https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/jpy.json',
                    parse: (data) => data?.jpy?.eur
                },
                exchangerate: {
                    name: 'exchangerate.host (ECB)',
                    url: 'https://api.exchangerate.host/latest?base=JPY&symbols=EUR',
                    parse: (data) => data?.rates?.EUR
                }
            };

            const getSourcesInOrder = () => {
                const preferred = preferredSource;
                const allKeys = Object.keys(API_SOURCES);
                const others = allKeys.filter(k => k !== preferred);
                return [preferred, ...others];
            };

            const fetchRate = async () => {
                setLoading(true);
                setError(null);
                setSourceInfo('');

                const order = getSourcesInOrder();
                let usedSource = null;

                for (const key of order) {
                    const api = API_SOURCES[key];
                    try {
                        const controller = new AbortController();
                        const timeoutId = setTimeout(() => controller.abort(), 6000);
                        const res = await fetch(api.url, { signal: controller.signal });
                        clearTimeout(timeoutId);
                        if (!res.ok) throw new Error(`HTTP ${res.status}`);
                        const data = await res.json();
                        const rate = api.parse(data);
                        if (typeof rate === 'number' && rate > 0) {
                            setJpyToEurRate(rate);
                            usedSource = api.name;
                            setSourceInfo(`✅ 数据来源: ${api.name}`);
                            setLoading(false);
                            return;
                        } else {
                            throw new Error('无效的汇率数据');
                        }
                    } catch (err) {
                        console.warn(`API "${api.name}" 失败:`, err.message);
                    }
                }

                setJpyToEurRate(FALLBACK_RATE);
                setSourceInfo(`⚠️ 所有 API 失败，使用备选汇率 ${FALLBACK_RATE}`);
                setError('所有汇率源均不可用，已切换至备选汇率');
                setLoading(false);
            };

            React.useEffect(() => {
                fetchRate();
                const timer = setInterval(fetchRate, 300000);
                return () => clearInterval(timer);
            }, [preferredSource]);

            // ---------- 抽卡规划本地存储 ----------
            React.useEffect(() => {
                localStorage.setItem('planPulls', String(planPulls));
                localStorage.setItem('planPullsTime', String(Date.now()));
                setLastSaved(new Date());
            }, [planPulls]);

            // ---------- 计算逻辑 ----------
            const calculateEuro = () => {
                const jpyAmount = coinAmount || 0;
                const rate = jpyToEurRate ?? FALLBACK_RATE;
                const rawEur = jpyAmount * rate;
                const roundedEur = Math.ceil(rawEur / 10) * 10;
                const cnyRate = parseFloat(cnyPer10Eur);
                const validRate = isNaN(cnyRate) || cnyRate < 0 ? 0 : cnyRate;
                const rawCny = (rawEur / 10) * validRate;
                const roundedCny = (roundedEur / 10) * validRate;
                return { jpy: jpyAmount, rawEur, roundedEur, rawCny, roundedCny };
            };

            const calculateYen = () => {
                const jpyAmount = coinAmount || 0;
                const rate = jpyToEurRate ?? FALLBACK_RATE;
                const cnyRate = parseFloat(cnyPer10Eur);
                const validRate = isNaN(cnyRate) || cnyRate < 0 ? 0 : cnyRate;
                // 1 JPY = (rate) EUR, 1 EUR = (cnyRate/10) CNY => 1 JPY = rate * (cnyRate/10) CNY
                const jpyToCny = rate * (validRate / 10);
                const totalCny = jpyAmount * jpyToCny;
                return { jpy: jpyAmount, totalCny, jpyToCny };
            };

            const euroResult = calculateEuro();
            const yenResult = calculateYen();

            // ---------- 辅助函数：本周四 ~ 下周四 ----------
            const getPlanPeriod = () => {
                const now = new Date();
                const day = now.getDay(); // 0=周日
                // 计算本周四（周四=4）
                const diffToThu = (day <= 4) ? (4 - day) : (4 + 7 - day);
                const thu = new Date(now);
                thu.setDate(now.getDate() + diffToThu);
                thu.setHours(0,0,0,0);
                const nextThu = new Date(thu);
                nextThu.setDate(thu.getDate() + 7);
                const format = (d) => `${d.getMonth()+1}/${d.getDate()}`;
                return `${format(thu)} ~ ${format(nextThu)}`;
            };

            // ---------- 渲染 JSX ----------
            return (
                <div className="app-container">
                    {/* 头部 */}
                    <header>
                        <h1>{activeTab === 'euro' ? '⚽ eFootball 金币换汇' : '⚽ eFootball 日元特惠'}</h1>
                        <div className="subtitle">
                            {activeTab === 'euro'
                                ? '12000 金币 = 12000 日元 · 欧元向上取整'
                                : '直接兑换 · 按实时汇率结算，无取整'}
                        </div>
                    </header>

                    {/* Tab 切换 */}
                    <div className="tab-bar">
                        <button
                            className={`tab-btn ${activeTab === 'euro' ? 'active' : ''}`}
                            onClick={() => setActiveTab('euro')}
                        >
                            💳 欧元卡
                        </button>
                        <button
                            className={`tab-btn ${activeTab === 'yen' ? 'active' : ''}`}
                            onClick={() => setActiveTab('yen')}
                        >
                            🎌 日元特惠
                        </button>
                    </div>

                    {/* 错误横幅 */}
                    {error && (
                        <div className="error-banner">
                            ⚠️ {error} <button onClick={fetchRate}>重试</button>
                        </div>
                    )}

                    {/* 汇率横幅 */}
                    <div className="rate-banner">
                        <span className="label">💱 日元 → 欧元</span>
                        <span className="value">
                            {loading ? '加载中...' :
                             `1 JPY = ${(jpyToEurRate ?? FALLBACK_RATE).toFixed(6)} EUR`}
                        </span>
                        <button className="refresh-btn" onClick={fetchRate} disabled={loading}>
                            {loading ? '↻' : '刷新'}
                        </button>
                    </div>

                    {/* 数据源切换 */}
                    <div className="source-selector">
                        <label htmlFor="sourceSelect">📡 首选数据源：</label>
                        <select
                            id="sourceSelect"
                            value={preferredSource}
                            onChange={(e) => setPreferredSource(e.target.value)}
                            disabled={loading}
                        >
                            <option value="cloudflare">Cloudflare Pages (推荐)</option>
                            <option value="jsdelivr">jsDelivr CDN (备选)</option>
                            <option value="exchangerate">exchangerate.host (ECB)</option>
                        </select>
                        <span style={{ fontSize: '12px', color: '#6b7280' }}>(切换后自动刷新)</span>
                    </div>
                    <div className="source-info">{sourceInfo}</div>

                    {/* 输入卡片（共享金额） */}
                    <div className="card">
                        <span className="label">
                            {activeTab === 'euro' ? '🪙 金币数量' : '🎌 日元金额'}
                        </span>
                        <div className="input-group">
                            <input
                                type="number"
                                value={coinAmount}
                                onChange={(e) => {
                                    const val = parseInt(e.target.value, 10);
                                    setCoinAmount(isNaN(val) || val < 0 ? 0 : val);
                                }}
                                min="0"
                                step="100"
                            />
                            <span className="unit-label">
                                {activeTab === 'euro' ? '金币' : '日元'}
                            </span>
                        </div>
                        <div className="slider-container">
                            <input
                                type="range"
