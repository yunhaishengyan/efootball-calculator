<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>⚽ eFootball 金币换汇 · 双模自动汇率</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js" crossorigin></script>
    <style>
        /* 样式保持不变（略，与上一版完全相同） */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #f0f2f5; min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 12px; touch-action: manipulation; }
        .app-container { max-width: 500px; width: 100%; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); }
        header { text-align: center; margin-bottom: 12px; }
        header h1 { font-size: 20px; color: #1a1a2e; margin-bottom: 2px; }
        header .subtitle { color: #888; font-size: 13px; }

        .tab-bar {
            display: flex;
            background: #f1f5f9;
            border-radius: 30px;
            padding: 4px;
            margin-bottom: 14px;
            gap: 4px;
        }
        .tab-btn {
            flex: 1;
            border: none;
            background: transparent;
            padding: 10px 0;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 500;
            color: #64748b;
            cursor: pointer;
            transition: all 0.25s;
            min-height: 44px;
        }
        .tab-btn.active {
            background: #6366f1;
            color: white;
            box-shadow: 0 2px 8px rgba(99,102,241,0.3);
        }
        .tab-btn:active { transform: scale(0.96); }

        .rate-banner {
            background: #eef2ff;
            border-radius: 12px;
            padding: 10px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .rate-banner .label { color: #4b5563; font-size: 13px; }
        .rate-banner .value { font-weight: 600; color: #1a1a2e; font-size: 14px; }
        .rate-banner .refresh-btn {
            background: #6366f1;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            min-height: 36px;
        }
        .rate-banner .refresh-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .source-selector {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f8fafc;
            padding: 6px 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .source-selector label { font-size: 13px; color: #4b5563; }
        .source-selector select {
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid #d1d5db;
            background: white;
            font-size: 13px;
        }
        .source-info { font-size: 12px; color: #4b5563; text-align: center; margin-top: 4px; }

        .card { background: #f8fafc; border-radius: 14px; padding: 16px; margin-bottom: 14px; }
        .card .label { font-size: 14px; color: #64748b; margin-bottom: 6px; display: block; }

        .input-group {
            display: flex;
            align-items: center;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
            background: white;
        }
        .input-group input {
            flex: 1;
            border: none;
            padding: 12px 14px;
            font-size: 18px;
            outline: none;
            background: transparent;
            min-height: 44px;
        }
        .input-group .unit-label {
            padding: 0 14px;
            color: #94a3b8;
            font-weight: 500;
            font-size: 14px;
            background: #f1f5f9;
            height: 100%;
            display: flex;
            align-items: center;
        }

        .slider-container { margin-top: 12px; }
        input[type="range"] {
            width: 100%;
            height: 4px;
            background: #e2e8f0;
            border-radius: 4px;
            outline: none;
            appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #6366f1;
            cursor: pointer;
            border: 2px solid white;
            box-shadow: 0 1px 4px rgba(0,0,0,0.15);
        }

        .result-box {
            background: #1e293b;
            border-radius: 16px;
            padding: 18px;
            color: white;
            text-align: center;
            margin-top: 12px;
        }
        .result-box .label { color: #94a3b8; font-size: 14px; display: block; margin-bottom: 6px; }
        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 6px;
        }
        .result-item {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 10px;
        }
        .result-item .sub-label { font-size: 12px; color: #94a3b8; display: block; }
        .result-item .amount {
            font-size: 24px;
            font-weight: 700;
            color: #fbbf24;
        }
        .result-item .amount .currency { font-size: 16px; font-weight: 400; color: #fbbf24; margin-right: 3px; }
        .result-single {
            font-size: 34px;
            font-weight: 700;
            color: #fbbf24;
            padding: 6px 0;
        }
        .result-single .currency { font-size: 22px; font-weight: 400; margin-right: 4px; }

        .detail-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            font-size: 13px;
            color: #94a3b8;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .detail-row span { display: inline-flex; align-items: center; gap: 4px; }
        .detail-row .highlight { color: #e2e8f0; font-weight: 500; }

        .footnote {
            text-align: center;
            color: #94a3b8;
            font-size: 11px;
            margin-top: 14px;
            padding-top: 10px;
            border-top: 1px solid #e2e8f0;
            line-height: 1.6;
        }
        .footnote .byline { color: #6366f1; font-weight: 500; font-size: 12px; }

        .error-banner {
            background: #fee2e2;
            color: #dc2626;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 12px;
            text-align: center;
        }
        .error-banner button {
            background: none;
            border: none;
            color: #6366f1;
            text-decoration: underline;
            cursor: pointer;
            font-weight: 500;
        }

        @media (max-width: 480px) {
            .source-selector { flex-direction: column; align-items: stretch; }
            .tab-btn { font-size: 14px; padding: 8px 0; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            // ---------- 状态 ----------
            // coinAmount 允许为 ''（空字符串）或数字
            const [coinAmount, setCoinAmount] = React.useState(12000);
            const [jpyToEurRate, setJpyToEurRate] = React.useState(null);
            const [jpyToCnyRate, setJpyToCnyRate] = React.useState(null);
            const [eurToCnyRate, setEurToCnyRate] = React.useState(null);
            const [loading, setLoading] = React.useState(true);
            const [error, setError] = React.useState(null);
            const [sourceInfo, setSourceInfo] = React.useState('');
            const [preferredSource, setPreferredSource] = React.useState('cloudflare');

            const [activeTab, setActiveTab] = React.useState('euro');
            // cnyPer10Eur 也允许空字符串
            const [cnyPer10Eur, setCnyPer10Eur] = React.useState('75');

            const FALLBACK_JPY_EUR = 0.0054;
            const FALLBACK_JPY_CNY = 0.0414;
            const FALLBACK_EUR_CNY = 7.5;

            // ---------- 数据源配置 ----------
            const API_SOURCES = {
                cloudflare: {
                    name: 'Cloudflare Pages (推荐)',
                    url: 'https://latest.currency-api.pages.dev/v1/currencies/jpy.json',
                    parse: (data) => {
                        const eur = data?.jpy?.eur;
                        const cny = data?.jpy?.cny;
                        return { eur, cny };
                    }
                },
                jsdelivr: {
                    name: 'jsDelivr CDN (备选)',
                    url: 'https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/jpy.json',
                    parse: (data) => {
                        const eur = data?.jpy?.eur;
                        const cny = data?.jpy?.cny;
                        return { eur, cny };
                    }
                },
                exchangerate: {
                    name: 'exchangerate.host (ECB)',
                    url: 'https://api.exchangerate.host/latest?base=JPY&symbols=EUR',
                    parse: (data) => {
                        const eur = data?.rates?.EUR;
                        return { eur, cny: null };
                    }
                }
            };

            const API_SOURCES_JPY_CNY = {
                exchangerate: {
                    name: 'exchangerate.host (JPY/CNY)',
                    url: 'https://api.exchangerate.host/latest?base=JPY&symbols=CNY',
                    parse: (data) => data?.rates?.CNY
                }
            };

            const getSourcesInOrder = (preferredKey) => {
                const allKeys = Object.keys(API_SOURCES);
                const others = allKeys.filter(k => k !== preferredKey);
                return [preferredKey, ...others];
            };

            // ---------- 核心获取 ----------
            const fetchRate = async () => {
                setLoading(true);
                setError(null);
                setSourceInfo('');

                let usedEurSource = null;
                let usedCnySource = null;
                let eurRate = null;
                let cnyRate = null;

                const order = getSourcesInOrder(preferredSource);
                for (const key of order) {
                    const api = API_SOURCES[key];
                    try {
                        const controller = new AbortController();
                        const timeoutId = setTimeout(() => controller.abort(), 6000);
                        const res = await fetch(api.url, { signal: controller.signal });
                        clearTimeout(timeoutId);
                        if (!res.ok) throw new Error(`HTTP ${res.status}`);
                        const data = await res.json();
                        const parsed = api.parse(data);
                        if (parsed.eur && typeof parsed.eur === 'number' && parsed.eur > 0) {
                            eurRate = parsed.eur;
                            usedEurSource = api.name;
                        }
                        if (parsed.cny && typeof parsed.cny === 'number' && parsed.cny > 0) {
                            cnyRate = parsed.cny;
                            usedCnySource = api.name;
                        }
                        if (eurRate !== null) break;
                    } catch (err) {
                        console.warn(`主源 "${api.name}" 失败:`, err.message);
                    }
                }

                if (eurRate === null) {
                    eurRate = FALLBACK_JPY_EUR;
                    usedEurSource = '备选 (JPY→EUR)';
                }

                if (cnyRate === null) {
                    // 尝试专用源
                    const cnyApi = API_SOURCES_JPY_CNY.exchangerate;
                    try {
                        const controller = new AbortController();
                        const timeoutId = setTimeout(() => controller.abort(), 6000);
                        const res = await fetch(cnyApi.url, { signal: controller.signal });
                        clearTimeout(timeoutId);
                        if (res.ok) {
                            const data = await res.json();
                            const rate = cnyApi.parse(data);
                            if (typeof rate === 'number' && rate > 0) {
                                cnyRate = rate;
                                usedCnySource = cnyApi.name;
                            }
                        }
                    } catch (err) {
                        console.warn('JPY→CNY 专用源失败:', err.message);
                    }
                }

                if (cnyRate === null) {
                    // 间接计算
                    let eurCnyRate = null;
                    try {
                        const url = 'https://api.exchangerate.host/latest?base=EUR&symbols=CNY';
                        const res = await fetch(url);
                        if (res.ok) {
                            const data = await res.json();
                            eurCnyRate = data?.rates?.CNY;
                        }
                    } catch (e) { /* ignore */ }
                    if (eurCnyRate && typeof eurCnyRate === 'number' && eurCnyRate > 0) {
                        cnyRate = eurRate * eurCnyRate;
                        usedCnySource = `间接 (EUR→CNY ${eurCnyRate.toFixed(4)})`;
                        setEurToCnyRate(eurCnyRate);
                    } else {
                        cnyRate = FALLBACK_JPY_CNY;
                        usedCnySource = '备选 (JPY→CNY)';
                    }
                }

                setJpyToEurRate(eurRate);
                setJpyToCnyRate(cnyRate);
                setSourceInfo(`✅ JPY→EUR: ${usedEurSource} | JPY→CNY: ${usedCnySource}`);
                if (usedEurSource.includes('备选') || usedCnySource.includes('备选')) {
                    setError('部分汇率使用备选值，可能不准确');
                } else {
                    setError(null);
                }
                setLoading(false);
            };

            React.useEffect(() => {
                fetchRate();
                const timer = setInterval(fetchRate, 300000);
                return () => clearInterval(timer);
            }, [preferredSource]);

            // ---------- 计算 ----------
            const getJpyAmount = () => Number(coinAmount) || 0;

            const calculateEuro = () => {
                const jpyAmount = getJpyAmount();
                const rate = jpyToEurRate ?? FALLBACK_JPY_EUR;
                const rawEur = jpyAmount * rate;
                const roundedEur = Math.ceil(rawEur / 10) * 10;
                const cnyRate = parseFloat(cnyPer10Eur);
                const validRate = isNaN(cnyRate) || cnyRate < 0 ? 0 : cnyRate;
                const rawCny = (rawEur / 10) * validRate;
                const roundedCny = (roundedEur / 10) * validRate;
                return { jpy: jpyAmount, rawEur, roundedEur, rawCny, roundedCny };
            };

            const calculateYen = () => {
                const jpyAmount = getJpyAmount();
                const rate = jpyToCnyRate ?? FALLBACK_JPY_CNY;
                const totalCny = jpyAmount * rate;
                return { jpy: jpyAmount, totalCny, rate };
            };

            const euroResult = calculateEuro();
            const yenResult = calculateYen();

            const displayRate = activeTab === 'euro'
                ? (jpyToEurRate ?? FALLBACK_JPY_EUR)
                : (jpyToCnyRate ?? FALLBACK_JPY_CNY);
            const displayCurrency = activeTab === 'euro' ? 'EUR' : 'CNY';
            const displayLabel = activeTab === 'euro' ? '💱 日元 → 欧元' : '💱 日元 → 人民币';

            // ---------- 输入处理 ----------
            const handleCoinChange = (e) => {
                const val = e.target.value;
                if (val === '') {
                    setCoinAmount('');
                } else {
                    const num = parseInt(val, 10);
                    if (!isNaN(num) && num >= 0) {
                        setCoinAmount(num);
                    }
                    // 如果输入非法字符（如字母），忽略
                }
            };

            const handleCnyPer10EurChange = (e) => {
                const val = e.target.value;
                if (val === '' || /^-?\d*\.?\d*$/.test(val)) {
                    setCnyPer10Eur(val);
                }
            };

            // ---------- 渲染 ----------
            return (
                <div className="app-container">
                    <header>
                        <h1>{activeTab === 'euro' ? '⚽ eFootball 金币换汇' : '⚽ eFootball 日元特惠'}</h1>
                        <div className="subtitle">
                            {activeTab === 'euro'
                                ? '12000 金币 = 12000 日元 · 欧元向上取整'
                                : '直接兑换 · 实时汇率自动获取'}
                        </div>
                    </header>

                    <div className="tab-bar">
                        <button
                            className={`tab-btn ${activeTab === 'euro' ? 'active' : ''}`}
                            onClick={() => setActiveTab('euro')}
                        >
                            💳 欧元卡
                        </button>
                        <button
                            className={`tab-btn ${activeTab === 'yen' ? 'active' : ''}`}
                            onClick={() => setActiveTab('yen')}
                        >
                            🎌 日元特惠
                        </button>
                    </div>

                    {error && (
                        <div className="error-banner">
                            ⚠️ {error} <button onClick={fetchRate}>重试</button>
                        </div>
                    )}

                    <div className="rate-banner">
                        <span className="label">{displayLabel}</span>
                        <span className="value">
                            {loading ? '加载中...' :
                             `1 JPY = ${displayRate.toFixed(6)} ${displayCurrency}`}
                        </span>
                        <button className="refresh-btn" onClick={fetchRate} disabled={loading}>
                            {loading ? '↻' : '刷新'}
                        </button>
                    </div>

                    <div className="source-selector">
                        <label htmlFor="sourceSelect">📡 首选数据源：</label>
                        <select
                            id="sourceSelect"
                            value={preferredSource}
                            onChange={(e) => setPreferredSource(e.target.value)}
                            disabled={loading}
                        >
                            <option value="cloudflare">Cloudflare Pages (推荐)</option>
                            <option value="jsdelivr">jsDelivr CDN (备选)</option>
                            <option value="exchangerate">exchangerate.host (ECB)</option>
                        </select>
                        <span style={{ fontSize: '12px', color: '#6b7280' }}>(切换后自动刷新)</span>
                    </div>
                    <div className="source-info">{sourceInfo}</div>

                    <div className="card">
                        <span className="label">
                            {activeTab === 'euro' ? '🪙 金币数量' : '🎌 日元金额'}
                        </span>
                        <div className="input-group">
                            <input
                                type="number"
                                value={coinAmount}
                                onChange={handleCoinChange}
                                min="0"
                                step="100"
                                placeholder="输入数量"
                            />
                            <span className="unit-label">
                                {activeTab === 'euro' ? '金币' : '日元'}
                            </span>
                        </div>
                        <div className="slider-container">
                            <input
                                type="range"
                                min="0"
                                max="50000"
                                step="100"
                                value={coinAmount === '' ? 0 : coinAmount}
                                onChange={(e) => setCoinAmount(Number(e.target.value))}
                            />
                            <div style={{ position: 'relative', width: '100%', height: '20px', marginTop: '4px' }}>
                                <span style={{ position: 'absolute', left: '0%', transform: 'translateX(-50%)', fontSize: '11px', color: '#94a3b8' }}>0</span>
                                <span style={{ position: 'absolute', left: '24%', transform: 'translateX(-50%)', fontSize: '11px', color: '#94a3b8' }}>12,000</span>
                                <span style={{ position: 'absolute', left: '100%', transform: 'translateX(-50%)', fontSize: '11px', color: '#94a3b8' }}>50,000</span>
                            </div>
                        </div>
                    </div>

                    {activeTab === 'euro' && (
                        <div className="card">
                            <span className="label">💵 每 10 欧元 = ? 人民币</span>
                            <div className="input-group">
                                <input
                                    type="text"
                                    inputMode="decimal"
                                    value={cnyPer10Eur}
                                    onChange={handleCnyPer10EurChange}
                                    placeholder="例如 75"
                                />
                                <span className="unit-label">元 / 10€</span>
                            </div>
                            <div style={{ fontSize: '12px', color: '#94a3b8', marginTop: '6px' }}>
                                例如：75 表示 10欧元 = 75元人民币
                            </div>
                        </div>
                    )}

                    {activeTab === 'yen' && (
                        <div style={{ fontSize: '13px', color: '#64748b', textAlign: 'center', marginBottom: '12px' }}>
                            💡 当前 1 日元 ≈ {(jpyToCnyRate ?? FALLBACK_JPY_CNY).toFixed(6)} 人民币
                            <span style={{ display: 'block', fontSize: '12px', color: '#94a3b8', marginTop: '4px' }}>
                                （实时汇率自动获取，无需手动输入）
                            </span>
                        </div>
                    )}

                    <div className="result-box">
                        <span className="label">
                            {activeTab === 'euro' ? '💳 需要支付的人民币' : '💴 兑换可得人民币'}
                        </span>

                        {activeTab === 'euro' ? (
                            <>
                                <div className="result-grid">
                                    <div className="result-item">
                                        <span className="sub-label">原始转换</span>
                                        <div className="amount"><span className="currency">¥</span>{euroResult.rawCny.toFixed(2)}</div>
                                    </div>
                                    <div className="result-item">
                                        <span className="sub-label">向上取整后</span>
                                        <div className="amount"><span className="currency">¥</span>{euroResult.roundedCny.toFixed(2)}</div>
                                    </div>
                                </div>
                                <div className="detail-row">
                                    <span>💶 原始欧元：<span className="highlight">{euroResult.rawEur.toFixed(2)}</span></span>
                                    <span>🔝 取整后：<span className="highlight">{euroResult.roundedEur}</span> EUR</span>
                                </div>
                                <div className="note" style={{ fontSize: '12px', color: '#64748b', marginTop: '6px' }}>
                                    {euroResult.jpy.toLocaleString()} 日元 → {euroResult.roundedEur} 欧元（向上取整）→ 计算人民币
                                </div>
                            </>
                        ) : (
                            <>
                                <div className="result-single">
                                    <span className="currency">¥</span>{yenResult.totalCny.toFixed(2)}
                                </div>
                                <div className="detail-row">
                                    <span>
                                        💴 {yenResult.jpy.toLocaleString()} 日元 × {(yenResult.rate || 0).toFixed(6)} = ¥ {yenResult.totalCny.toFixed(2)}
                                    </span>
                                </div>
                            </>
                        )}
                    </div>

                    <div className="footnote">
                        汇率数据：优先直接获取 JPY→CNY，若不可用则间接换算 · 备选 JPY/CNY: {FALLBACK_JPY_CNY}<br />
                        <span className="byline">by guiqulaixi</span>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
